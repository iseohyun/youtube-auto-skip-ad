<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT ad watch & click</title>
  <!-- Google Fonts 구글 폰트 적용 -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <header class="header">
      <div class="logo-area">
        <img src="icon.png" alt="Logo" class="logo-img" id="logo-icon">
        <h1 class="title">YT <span class="gradient-text">ad watch & click</span></h1>
      </div>
      <!-- 스위치 토글 버튼 -->
      <label class="switch-container" for="toggle-switch">
        <input type="checkbox" id="toggle-switch" checked>
        <span class="slider"></span>
      </label>
    </header>

    <main class="main-content">
      <!-- 그룹 1: 영상 & 광고 시청 계기판 (2x2 그리드) -->
      <div class="stats-grid-2x2">
        <div class="stats-box">
          <div class="stats-label">총 영상시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="total-watch-time">0 00:00:00</span>
          </div>
        </div>
        <div class="stats-box">
          <div class="stats-label">현재 영상시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="current-watch-time">0 00:00:00</span>
          </div>
        </div>
        <div class="stats-box" id="card-total-ad-time">
          <div class="stats-label">총 광고시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="total-ad-time">0 00:00:00</span>
          </div>
        </div>
        <div class="stats-box" id="card-current-ad-time">
          <div class="stats-label">현재영상 광고시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="current-ad-time">0 00:00:00</span>
          </div>
        </div>
      </div>

      <!-- 그룹 2: 실시간 감지 신호등 (3 x 2 그리드) -->
      <div class="telemetry-section">
        <div class="section-title">실시간 스킵 필터 진단판</div>
        <div class="light-grid">
          <!-- 1. 버튼 감지 -->
          <div class="light-item">
            <div class="light-circle" id="light-tag-detected" title="DOM상 스킵 버튼 태그가 발견되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            </div>
            <div class="light-label">버튼 감지</div>
          </div>
          <!-- 2. 버튼 위치/크기 -->
          <div class="light-item">
            <div class="light-circle" id="light-rect-found" title="버튼의 실제 너비/높이 픽셀 크기가 확보되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
            </div>
            <div class="light-label">버튼 위치/크기</div>
          </div>
          <!-- 3. 버튼 보임 -->
          <div class="light-item">
            <div class="light-circle" id="light-visible" title="CSS 속성상 display none 혹은 visibility hidden이 아닐 때 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <div class="light-label">버튼 보임</div>
          </div>
          <!-- 4. 광고 재생 중 -->
          <div class="light-item">
            <div class="light-circle" id="light-video-playing" title="광고 동영상이 현재 일시정지 상태가 아니라 실제로 재생 중일 때 켜집니다. 일시정지 시 대기 시간 타이머가 멈춥니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="light-label">광고 재생 중</div>
          </div>
          <!-- 5. 필수 시청 완료 -->
          <div class="light-item">
            <div class="light-circle" id="light-timer-detected" title="화면의 카운트다운 숫자를 추적합니다. 완료되면 초록색으로 켜집니다.">
              <div class="light-circle-inner">
                <!-- SVG Progress Ring -->
                <svg class="progress-ring" width="32" height="32">
                   <circle class="progress-ring__circle-bg" stroke="#ef4444" stroke-width="2.5" fill="transparent" r="13" cx="16" cy="16"/>
                   <circle class="progress-ring__circle" id="timer-progress-bar" stroke="#10b981" stroke-width="2.5" fill="transparent" r="13" cx="16" cy="16" stroke-dasharray="81.68" stroke-dashoffset="81.68"/>
                </svg>
                <!-- 완료 체크 아이콘 -->
                <svg viewBox="0 0 24 24" class="light-icon" id="timer-complete-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
              </div>
            </div>
            <div class="light-label">필수 시청 완료</div>
          </div>
          <!-- 6. 버튼 불투명 -->
          <div class="light-item">
            <div class="light-circle" id="light-opacity-normal" title="버튼 불투명도(opacity)가 0.1을 초과해 선명해지면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm1-17.93c3.95.49 7 3.85 7 7.93s-3.05 7.44-7 7.93V4.07z"/></svg>
            </div>
            <div class="light-label">버튼 불투명</div>
          </div>
        </div>
      </div>

      <!-- 클릭 설정 -->
      <div class="telemetry-section">
        <div class="section-title">클릭 설정</div>
        <div class="light-grid grid-4x1">
          <!-- 1. 클릭 수행 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-force-click" title="마우스 클릭 시 즉시 수동 강제 스킵 클릭 대행을 실행합니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg>
            </button>
            <div class="light-label">클릭 수행</div>
          </div>
          <!-- 2. 지연 클릭 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-delay-click" title="클릭 전 지연 시간(1.0~2.5초)을 적용합니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm3.3 14.88L11 14V7h1.5v5.25l3.5 2.1-.71 1.53z"/></svg>
            </button>
            <div class="light-label">지연 클릭</div>
          </div>
          <!-- 3. 랜덤 위치 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-random-click" title="버튼 영역의 무작위 좌표로 분산 클릭합니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <div class="light-label">랜덤 위치 클릭</div>
          </div>
          <!-- 4. 가상 클릭 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-virtual-click" title="ON인 경우 디버거(isTrusted = true)로 클릭하고, OFF인 경우 합성 이벤트(isTrusted = false)로 클릭합니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.4z"/></svg>
            </button>
            <div class="light-label">가상 클릭</div>
          </div>
        </div>
      </div>

      <!-- 로그 -->
      <div class="telemetry-section" style="margin-top: 10px;">
        <div class="section-title">로그</div>
        <div class="light-grid grid-4x1">
          <!-- 1. 현재 상태 복사 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-copy-all" title="현재 상태, 재생 정보, 최근 기록, 오류 내역을 한 번에 복사합니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
            <div class="light-label">현재 상태 복사</div>
          </div>
          <!-- 2. 로그 초기화 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-reset-logs" title="시청 기록 및 내부 오류 로그를 완전히 비웁니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <div class="light-label">로그 초기화</div>
          </div>
          <!-- 3. 시청시간 초기화 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-reset-watch-time" title="총 영상시청시간과 총 광고시청시간 통계를 0초로 초기화합니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm3.3 14.88L11 14V7h1.5v5.25l3.5 2.1-.71 1.53z"/></svg>
            </button>
            <div class="light-label">시청시간&nbsp;초기화</div>
          </div>
          <!-- 4. 대시보드 초기화 -->
          <div class="light-item">
            <button class="btn-circle" id="btn-reset-dashboard" title="대시보드 설정을 초기 상태(지연 ON, 랜덤 ON, 가상 OFF)로 되돌립니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <div class="light-label">대시보드&nbsp;초기화</div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <span class="version">v1.2.0 beta</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
