<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT ad watch & click</title>
  <!-- Google Fonts 구글 폰트 적용 -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <header class="header">
      <div class="logo-area">
        <img src="icon.png" alt="Logo" class="logo-img" id="logo-icon">
        <h1 class="title">YT <span class="gradient-text">ad watch & click</span></h1>
      </div>
      <!-- 스위치 토글 버튼 -->
      <label class="switch-container" for="toggle-switch">
        <input type="checkbox" id="toggle-switch" checked>
        <span class="slider"></span>
      </label>
    </header>

    <main class="main-content">
      <!-- 그룹 1: 영상 & 광고 시청 계기판 (2x2 그리드) -->
      <div class="stats-grid-2x2">
        <div class="stats-box">
          <div class="stats-label">총 영상시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="total-watch-time">0 00:00:00</span>
          </div>
        </div>
        <div class="stats-box">
          <div class="stats-label">현재 영상시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="current-watch-time">0 00:00:00</span>
          </div>
        </div>
        <div class="stats-box" id="card-total-ad-time">
          <div class="stats-label">총 광고시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="total-ad-time">0 00:00:00</span>
          </div>
        </div>
        <div class="stats-box" id="card-current-ad-time">
          <div class="stats-label">현재영상 광고시청시간</div>
          <div class="counter-container">
            <span class="counter font-small monospace" id="current-ad-time">0 00:00:00</span>
          </div>
        </div>
      </div>

      <!-- 그룹 2: 실시간 감지 신호등 (3 x 2 그리드) -->
      <div class="telemetry-section">
        <div class="section-title">실시간 스킵 필터 진단판</div>
        <div class="light-grid">
          <!-- 1. 버튼 감지 -->
          <div class="light-item">
            <div class="light-circle" id="light-tag-detected" title="DOM상 스킵 버튼 태그가 발견되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            </div>
            <div class="light-label">버튼 감지</div>
          </div>
          <!-- 2. 위치/크기 -->
          <div class="light-item">
            <div class="light-circle" id="light-rect-found" title="버튼의 실제 너비/높이 픽셀 크기가 확보되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
            </div>
            <div class="light-label">위치/크기</div>
          </div>
          <!-- 3. 가시성 -->
          <div class="light-item">
            <div class="light-circle" id="light-visible" title="CSS 속성상 display none 혹은 visibility hidden이 아닐 때 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <div class="light-label">가시성</div>
          </div>
          <!-- 4. 재생 중 -->
          <div class="light-item">
            <div class="light-circle" id="light-video-playing" title="광고 동영상이 현재 일시정지 상태가 아니라 실제로 재생 중일 때 켜집니다. 일시정지 시 대기 시간 타이머가 멈춥니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="light-label">재생 중</div>
          </div>
          <!-- 5. 타이머 감지 -->
          <div class="light-item">
            <div class="light-circle" id="light-timer-detected" title="화면의 카운트다운 숫자를 추적합니다. 완료되면 초록색으로 켜집니다.">
              <div class="light-circle-inner">
                <!-- SVG Progress Ring -->
                <svg class="progress-ring" width="32" height="32">
                  <circle class="progress-ring__circle-bg" stroke="#ef4444" stroke-width="2.5" fill="transparent" r="13" cx="16" cy="16"/>
                  <circle class="progress-ring__circle" id="timer-progress-bar" stroke="#10b981" stroke-width="2.5" fill="transparent" r="13" cx="16" cy="16" stroke-dasharray="81.68" stroke-dashoffset="81.68"/>
                </svg>
                <!-- 완료 체크 아이콘 -->
                <svg viewBox="0 0 24 24" class="light-icon" id="timer-complete-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
              </div>
            </div>
            <div class="light-label">타이머 감지</div>
          </div>
          <!-- 5. 투명도 정상 -->
          <div class="light-item">
            <div class="light-circle" id="light-opacity-normal" title="버튼 불투명도(opacity)가 0.8을 초과해 선명해지면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm1-17.93c3.95.49 7 3.85 7 7.93s-3.05 7.44-7 7.93V4.07z"/></svg>
            </div>
            <div class="light-label">투명도 정상</div>
          </div>
          <!-- 6. 활성 상태 -->
          <div class="light-item">
            <div class="light-circle" id="light-not-disabled" title="버튼의 disabled 혹은 aria-disabled='true' 잠금 속성이 해제되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm-1 12.91L8.09 12l1.41-1.41L11 12.09l4.59-4.59L17 8.91l-6 6z"/></svg>
            </div>
            <div class="light-label">활성 상태</div>
          </div>
          <!-- 7. 클릭 가능 상태 -->
          <div class="light-item">
            <div class="light-circle" id="light-class-clickable" title="버튼 스타일의 커서 모양이 클릭 가능 형태(pointer) 혹은 활성화 클래스가 주입되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <div class="light-label">클릭 가능 상태</div>
          </div>
        </div>
      </div>

      <!-- 그룹 3: 실행 및 클릭 분석 -->
      <div class="click-section">
        <div class="section-title">실행 및 클릭 분석</div>
        <div class="click-grid">
          <!-- 1. 클릭 수행 -->
          <div class="click-row" id="row-click-perform" title="마우스로 클릭 시 즉시 수동 강제 스킵 클릭 대행을 실행합니다 (디버그 도구).">
            <div class="light-circle" id="light-clicked" title="지연 대기 후 클릭 이벤트가 전송되면 켜집니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <div class="click-info">
              <div class="click-label">클릭 수행</div>
              <div class="click-value" id="val-clicked">대기 중</div>
            </div>
          </div>
          <!-- 2. 클릭 실패 경고 -->
          <div class="click-row">
            <div class="light-circle" id="light-click-failed" title="클릭을 실행했음에도 3.5초 이상 광고 창이 강제로 유지되는 상황입니다.">
              <svg viewBox="0 0 24 24" class="light-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <div class="click-info">
              <div class="click-label">클릭 실패 경고</div>
              <div class="click-value" id="val-warning">정상</div>
            </div>
          </div>
          <!-- 3. 지연 클릭 -->
          <div class="click-row">
            <div class="click-icon-box">
              <svg viewBox="0 0 24 24" class="click-svg-icon"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm3.3 12.88L11 12.43V7h1.5v4.55l3.52 2.1-.73 1.23z"/></svg>
            </div>
            <div class="click-info">
              <div class="click-label">지연 클릭</div>
              <div class="click-value" id="val-delay">대기 중</div>
            </div>
          </div>
          <!-- 4. 랜덤 위치 클릭 -->
          <div class="click-row">
            <div class="click-icon-box">
              <svg viewBox="0 0 24 24" class="click-svg-icon"><path fill="currentColor" d="M12 2c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 18c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.22 18.58 10.57 19 12 19c4.97 0 9-4.03 9-9s-4.03-9-9-9zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
            </div>
            <div class="click-info">
              <div class="click-label">랜덤 위치 클릭</div>
              <div class="click-value" id="val-coordinates">대기 중</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 그룹 4: 진단 도구 및 리포터 (3x2 그리드) -->
      <div class="diagnostic-section">
        <div class="section-title">진단 도구 및 리포터</div>
        <div class="diagnostic-grid-3x2">
          <!-- 현재상태복사 버튼 -->
          <button class="btn-diag" id="report-skip-failed-btn" title="현재 스킵 필터 진단 상태를 클립보드에 복사합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span>현재상태복사</span>
          </button>
          <!-- 차단가드정보 버튼 -->
          <button class="btn-diag" id="report-enforcement-btn" title="유튜브 광고 차단 방지 가드 정보를 클립보드에 복사합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 6h2v2h-2V7zm0 4h2v6h-2v-6z"/></svg>
            <span>차단가드정보</span>
          </button>
          <!-- 시청 기록 복사 버튼 (기록: Skip #회) -->
          <button class="btn-diag" id="btn-copy-history" title="지금까지 시청한 동영상 기록 목록을 클립보드에 복사합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.25 2.52.75-1.23-3.5-2.09V8z"/></svg>
            <span id="label-copy-history">기록: Skip 0회</span>
          </button>
          <!-- 오류 내역 복사 버튼 -->
          <button class="btn-diag" id="btn-copy-errors" title="확장 프로그램 실행 중 발생한 내부 오류 로그를 클립보드에 복사합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span>오류 내역 복사</span>
          </button>
          <!-- 로그 초기화 버튼 (가로 병합) -->
          <button class="btn-diag" id="reset-button" style="grid-column: span 2;" title="시청 기록 및 오류 로그를 완전히 초기화합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            <span>로그 초기화</span>
          </button>
        </div>
      </div>

      <!-- 그룹 5: 스킵 기술 테스트 (개발용 3x2 그리드) -->
      <div class="diagnostic-section" style="margin-top: 10px;">
        <div class="section-title">그룹 5: 스킵 기술 테스트 (개발용)</div>
        <div class="diagnostic-grid-3x2">
          <!-- S1: 디버거 클릭 -->
          <button class="btn-diag test-btn" id="btn-test-s1" title="크롬 디버거 API를 사용해 isTrusted=true 신뢰 클릭을 강제 주입합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.11-.9-2-2-2H4c-1.1 0-2 .89-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
            <span>S1: 디버거 클릭</span>
          </button>
          <!-- S2: 포인터클릭 -->
          <button class="btn-diag test-btn" id="btn-test-s2" title="click 이벤트를 PointerEvent 규격으로 생성하여 3중 전달합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M7 2h10v2H7V2zm0 18h10v2H7v-2zM12 6a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>
            <span>S2: 포인터클릭</span>
          </button>
          <!-- S3: 궤적의태 클릭 -->
          <button class="btn-diag test-btn" id="btn-test-s3" title="클릭 전 마우스 이동 궤적(pointermove)을 의태한 후 클릭을 집행합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg>
            <span>S3: 궤적의태 클릭</span>
          </button>
          <!-- S4: API 직접호출 -->
          <button class="btn-diag test-btn" id="btn-test-s4" title="웹페이지(MAIN) 컨텍스트에 스크립트를 주입해 player.skipAd()를 직접 실행합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            <span>S4: API 직접호출</span>
          </button>

          <!-- S6: 변이/종료 도청 -->
          <button class="btn-diag test-btn" id="btn-test-s6" title="비디오 ended 리스너와 버튼 MutationObserver 시간 오차를 감지합니다.">
            <svg viewBox="0 0 24 24" class="btn-diag-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span>S6: 변이/종료 도청</span>
          </button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <span class="version">v1.1-beta</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
